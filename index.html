<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeniero de Anuncios | Metodología Andrómeda</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #002d5a; /* Azul Cobalto */
            --accent: #00d4ff; /* Cyan Eléctrico */
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: var(--accent); text-align: center; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--accent); border: none; color: var(--primary); font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #00b8e6; transform: scale(1.02); }
        .results { margin-top: 30px; padding: 20px; background: #252525; border-radius: 10px; display: none; }
        .score-box { text-align: center; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .critical { border-left: 5px solid #ff4b2b; }
        .optimal { border-left: 5px solid #00f260; }
        .pdf-btn { background: #ff4b2b; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 Ingeniero de Anuncios - Auditoría Pro</h1>
    <p style="text-align:center; font-size: 14px;">Diagnóstico Técnico bajo Metodología Andrómeda</p>

    <div class="grid">
        <div>
            <label>Inversión Total ($)</label>
            <input type="number" id="spend" placeholder="Ej: 100">
        </div>
        <div>
            <label>Impresiones</label>
            <input type="number" id="impressions" placeholder="Ej: 10000">
        </div>
        <div>
            <label>Clics (Todos)</label>
            <input type="number" id="clicks" placeholder="Ej: 200">
        </div>
        <div>
            <label>Leads / Ventas</label>
            <input type="number" id="conversions" placeholder="Ej: 10">
        </div>
        <div>
            <label>Nicho de Mercado</label>
            <select id="niche">
                <option value="high">High Ticket / Servicios B2B</option>
                <option value="ecommerce">E-commerce / Consumo</option>
                <option value="infoproducto">Infoproductos / Educación</option>
            </select>
        </div>
        <div>
            <label>Nivel de Saturación del Ángulo</label>
            <select id="saturation">
                <option value="low">Baja (Ángulo Innovador)</option>
                <option value="med">Media (Mercado Consciente)</option>
                <option value="high">Alta (Mercado Sofisticado)</option>
            </select>
        </div>
    </div>

    <div style="margin-top:20px;">
        <label>Análisis del Creativo (Describe el Gancho y Visual)</label>
        <textarea id="creative_desc" rows="3" placeholder="Ej: Video de 15s, gancho directo al dolor de falta de ventas, color rojo..."></textarea>
    </div>

    <button onclick="runAudit()">GENERAR AUDITORÍA TÉCNICA</button>

    <div id="results" class="results">
        <div id="scoreBox" class="score-box"></div>
        <div id="metricsReport"></div>
        <div id="recommendations" style="margin-top:15px; font-size:14px; line-height:1.6;"></div>
        <button class="pdf-btn" onclick="generatePDF()">DESCARGAR REPORTE PDF</button>
    </div>
</div>

<script>
    function runAudit() {
        // Obtener Valores
        const spend = parseFloat(document.getElementById('spend').value);
        const impressions = parseFloat(document.getElementById('impressions').value);
        const clicks = parseFloat(document.getElementById('clicks').value);
        const conversions = parseFloat(document.getElementById('conversions').value);
        const niche = document.getElementById('niche').value;
        
        // Cálculos Básicos
        const ctr = (clicks / impressions) * 100;
        const cpc = spend / clicks;
        const cpa = spend / conversions;
        const cpm = (spend / impressions) * 1000;

        // Lógica de Puntuación Andrómeda
        let score = 100;
        let recs = [];
        let prediction = "";

        if(ctr < 1) { score -= 30; recs.push("❌ CRÍTICO: El Gancho (Hook) es invisible. Necesitas un cambio visceral en los primeros 1.5s."); }
        if(cpa > (spend/2)) { score -= 20; recs.push("⚠️ FINANZAS: El costo por adquisición está devorando tu margen. Optimiza la landing."); }
        
        // Predicción
        const improvedCtr = ctr * 1.5;
        const projectedConversions = Math.round(conversions * 1.5);
        prediction = `Si ajustas el Gancho Visual (Andrómeda Rule), tu CTR podría subir a ${improvedCtr.toFixed(2)}%, proyectando un aumento a ${projectedConversions} conversiones con el mismo presupuesto.`;

        // Mostrar Resultados
        document.getElementById('results').style.display = 'block';
        const sBox = document.getElementById('scoreBox');
        sBox.innerHTML = `<h2>PUNTUACIÓN DE INGENIERÍA: ${score}/100</h2>`;
        sBox.style.background = score > 70 ? '#004d26' : '#4d0000';

        document.getElementById('metricsReport').innerHTML = `
            <p>📊 <b>CTR:</b> ${ctr.toFixed(2)}% | <b>CPC:</b> $${cpc.toFixed(2)} | <b>CPM:</b> $${cpm.toFixed(2)}</p>
            <hr>
            <p>🔮 <b>PREDICCIÓN POST-AJUSTE:</b> ${prediction}</p>
        `;

        document.getElementById('recommendations').innerHTML = `
            <h3>RECOMENDACIONES ESPECÍFICAS:</h3>
            <ul>${recs.map(r => `<li>${r}</li>`).join('')}</ul>
        `;
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("REPORTE DE AUDITORÍA - INGENIERO DE ANUNCIOS", 10, 20);
        doc.setFont("helvetica", "normal");
        doc.text(`Puntuación: ${document.getElementById('scoreBox').innerText}`, 10, 30);
        doc.text(`Análisis: ${document.getElementById('metricsReport').innerText}`, 10, 40);
        doc.text("Recomendaciones técnicas aplicadas según Metodología Andrómeda.", 10, 60);
        doc.save("Auditoria_Andromeda.pdf");
    }
</script>

</body>
</html>
